<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta property="og:title" content="Lucero ✨">
<meta property="og:description" content="Hay algo que quiero mostrarte...">
<meta property="og:image" content="https://beamish-parfait-141c97.netlify.app/preview.png">
<meta property="og:type" content="website">
<meta property="og:url" content="https://beamish-parfait-141c97.netlify.app">

<title>Para Lucero ✨</title>

<style>

body{
margin:0;
font-family:Segoe UI;
background:#000;
overflow:hidden;
color:white;
text-align:center;
}

/* estrellas */

.star{
position:absolute;
width:2px;
height:2px;
background:white;
animation:twinkle 3s infinite;
}

@keyframes twinkle{
0%{opacity:0}
50%{opacity:1}
100%{opacity:0}
}

/* pantalla inicio */

#inicio{
position:absolute;
width:100%;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

background:
linear-gradient(rgba(0,0,0,0.5),rgba(0,0,0,0.8)),
url("preview.png");

background-size:cover;
background-position:center;
}

h1{
font-size:40px;
margin-bottom:20px;
}

button{
padding:16px 40px;
font-size:18px;
border:none;
border-radius:40px;
background:white;
color:#ff4d6d;
cursor:pointer;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

/* contenido */

#contenido{
display:none;
padding:40px 20px;
height:100vh;
background:radial-gradient(circle,#0f2027,#203a43,#2c5364);
}

/* nombre */

.nombre{
font-size:60px;
color:#ff7eb3;
text-shadow:
0 0 10px #ff7eb3,
0 0 20px #ff7eb3,
0 0 40px #ff7eb3;
margin-bottom:20px;
}

/* mensaje */

#mensaje{
font-size:20px;
max-width:600px;
margin:auto;
line-height:1.8;
}

/* contador */

#contador{
margin-top:20px;
font-size:16px;
color:#ffd6e0;
}

/* mensaje final */

.finalMensaje{
margin-top:30px;
font-size:22px;
opacity:0;
transition:2s;
color:#ffd6e0;
}

/* rosas */

.rose{
position:fixed;
top:-10vh;
font-size:26px;
animation:fall 9s linear;
pointer-events:none;
z-index:9999;
}

@keyframes fall{
0%{
transform:translateY(-10vh) rotate(0deg);
opacity:1;
}
100%{
transform:translateY(120vh) rotate(360deg);
opacity:0;
}
}

/* responsive */

@media(max-width:600px){

.nombre{
font-size:40px;
}

#mensaje{
font-size:18px;
padding:0 10px;
}

h1{
font-size:28px;
}

button{
font-size:16px;
padding:14px 30px;
}

}

</style>
</head>

<body>

<audio id="musica" loop>
<source src="musica_lucero.mp3" type="audio/mpeg">
</audio>

<div id="inicio">

<h1>Tengo algo para ti</h1>

<button onclick="abrir()">Toca aquí Lucero ✨</button>

</div>

<div id="contenido">

<div class="nombre">Lucero ✨</div>

<div id="mensaje"></div>

<div id="contador"></div>

<div id="final" class="finalMensaje">
✨ Espero haberte sacado una sonrisa 😊
</div>

</div>

<script>

/* estrellas */

for(let i=0;i<150;i++){

let star=document.createElement("div")

star.className="star"

star.style.left=Math.random()*100+"vw"

star.style.top=Math.random()*100+"vh"

star.style.animationDuration=(2+Math.random()*3)+"s"

document.body.appendChild(star)

}

/* abrir */

function abrir(){

document.getElementById("inicio").style.display="none"

document.getElementById("contenido").style.display="block"

document.getElementById("musica").play()

iniciarRosas()

escribir()

}

/* texto */

let texto=`Hoy es el Día de la Mujer...

y pensé que era un buen momento
para decir algo.

Lucero...

tu forma de ser,
tu energía
y tu sonrisa

hacen que todo
se sienta un poco más bonito.

Solo quería que lo supieras. ✨`

let i=0

function escribir(){

let cont=document.getElementById("mensaje")

function type(){

if(i<texto.length){

cont.innerHTML+=texto.charAt(i)

i++

setTimeout(type,65)

}else{

explosionRosas()

}

}

type()

}

document.getElementById("contador").innerHTML=

}

setInterval(actualizar,1000)

/* lluvia de rosas */

let lluvia

function iniciarRosas(){

lluvia=setInterval(()=>{

crearRosa()

},900)

}

function crearRosa(){

let r=document.createElement("div")

r.className="rose"

r.innerHTML="🌹"

r.style.left=Math.random()*100+"%"

document.body.appendChild(r)

setTimeout(()=>{

r.remove()

},9000)

}

/* explosión final */

function explosionRosas(){

for(let j=0;j<40;j++){

crearRosa()

}

setTimeout(()=>{

let final=document.getElementById("final")

final.style.opacity="1"

},2000)

}

</script>

</body>
</html>
